<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Site Blocked - BlockNSFW</title>
  <style>
    :root {
      /* ===== Clean Modern Dark — single indigo accent (matches options.html) ===== */

      /* Surfaces */
      --background: #0b0c10;
      --background-gradient: linear-gradient(180deg, #0c0d12 0%, #0a0b0e 100%);
      --surface: #14161c;
      --surface-2: #1a1d24;
      --foreground: #f2f3f5;
      --foreground-muted: #a4abb8;
      --foreground-dim: #868e9e;

      /* Card */
      --card-bg: #14161c;
      --card-border: rgba(255, 255, 255, 0.07);
      --card-border-hover: rgba(255, 255, 255, 0.14);
      --card-shadow: 0 1px 2px rgba(0, 0, 0, 0.35);
      --card-shadow-hover: 0 18px 40px rgba(0, 0, 0, 0.45);

      /* Primary accent (indigo) */
      --primary: #6366f1;
      --primary-hover: #818cf8;
      --primary-glow: rgba(99, 102, 241, 0.22);
      --primary-soft: rgba(99, 102, 241, 0.12);
      --primary-foreground: #ffffff;

      /* Secondary */
      --secondary: #1d2027;
      --secondary-hover: #262a33;
      --secondary-foreground: #e6e8ec;

      /* Inputs / surfaces */
      --input-bg: #0f1116;
      --input-border: rgba(255, 255, 255, 0.10);

      /* Status */
      --destructive: #ef4444;
      --destructive-hover: #dc2626;

      /* Typography */
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;

      /* Spacing & sizing */
      --radius: 10px;
      --radius-sm: 8px;
      --radius-lg: 14px;
      --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-fast: all 0.12s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-sans);
      background: var(--background-gradient);
      color: var(--foreground);
      line-height: 1.6;
      font-size: 14px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      display: grid;
      place-items: center;
      min-height: 100dvh;
      padding: 1.5rem 1rem;
    }

    .container {
      width: 100%;
      max-width: 560px;
    }

    /* Card — mirrors options.html .card with the indigo top-line accent */
    .blocked-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: var(--radius-lg);
      padding: 1.75rem;
      box-shadow: var(--card-shadow);
      transition: var(--transition);
      position: relative;
      overflow: hidden;
      animation: fadeIn 0.4s ease-out;
    }

    .blocked-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
      opacity: 0.5;
      transition: var(--transition);
    }

    .blocked-card:hover {
      border-color: var(--card-border-hover);
      box-shadow: var(--card-shadow-hover);
    }

    .blocked-card:hover::before {
      opacity: 1;
    }

    /* Header */
    .blocked-header {
      display: flex;
      align-items: center;
      gap: 0.875rem;
      margin-bottom: 1.5rem;
    }

    .blocked-icon {
      width: 46px;
      height: 46px;
      background: rgba(239, 68, 68, 0.12);
      border: 1px solid rgba(239, 68, 68, 0.28);
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.45rem;
      flex-shrink: 0;
    }

    .blocked-title-section h1 {
      font-size: 1.4rem;
      font-weight: 650;
      color: var(--foreground);
      letter-spacing: -0.02em;
      line-height: 1.2;
      margin-bottom: 0.2rem;
    }

    .blocked-subtitle {
      color: var(--foreground-muted);
      font-size: 0.9rem;
      font-weight: 400;
      margin: 0;
    }

    /* Content */
    .blocked-content {
      margin-bottom: 1.75rem;
    }

    .blocked-message {
      color: var(--foreground-muted);
      font-size: 0.95rem;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }

    /* Muted lines (Reason / AI confidence — injected by blocked.js) */
    .muted {
      color: var(--foreground-dim);
      font-size: 0.85rem;
      margin-top: 0.5rem;
    }

    /* Section label (matches options.html section-title / stat-label) */
    .blocked-url-label {
      color: var(--foreground-dim);
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 0.5rem;
    }

    /* URL box — input-style surface */
    .blocked-url {
      background: var(--input-bg);
      border: 1px solid var(--input-border);
      border-radius: var(--radius-sm);
      padding: 0.75rem 0.875rem;
      font-family: var(--font-mono);
      font-size: 0.85rem;
      color: var(--foreground);
      word-break: break-all;
      line-height: 1.45;
      transition: var(--transition-fast);
    }

    .blocked-url:hover {
      border-color: var(--primary);
    }

    /* Trigger-word chips — code-style (matches options.html .code) */
    .matched-terms {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }

    .matched-term {
      background: var(--primary-soft);
      border: 1px solid rgba(99, 102, 241, 0.25);
      border-radius: var(--radius-sm);
      padding: 0.3rem 0.6rem;
      font-family: var(--font-mono);
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--primary-hover);
      word-break: break-word;
      line-height: 1.3;
      transition: var(--transition-fast);
    }

    .matched-term:hover {
      background: rgba(99, 102, 241, 0.2);
    }

    /* Actions */
    .blocked-actions {
      display: flex;
      gap: 0.625rem;
      flex-wrap: wrap;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.375rem;
      padding: 0.625rem 1.125rem;
      font-family: var(--font-sans);
      font-size: 0.875rem;
      font-weight: 500;
      border-radius: var(--radius-sm);
      border: 1px solid var(--card-border);
      background: var(--secondary);
      color: var(--secondary-foreground);
      text-decoration: none;
      cursor: pointer;
      transition: var(--transition-fast);
      white-space: nowrap;
    }

    .button:hover {
      background: var(--secondary-hover);
      border-color: var(--card-border-hover);
    }

    .button:focus-visible {
      outline: none;
      box-shadow: 0 0 0 3px var(--primary-glow);
    }

    .button-primary {
      background: var(--primary);
      color: var(--primary-foreground);
      border-color: var(--primary);
    }

    .button-primary:hover {
      background: var(--primary-hover);
      border-color: var(--primary-hover);
    }

    .button-destructive {
      background: transparent;
      color: var(--destructive);
      border-color: rgba(239, 68, 68, 0.4);
    }

    .button-destructive:hover {
      background: rgba(239, 68, 68, 0.12);
      border-color: var(--destructive);
      color: var(--destructive);
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 560px) {
      .blocked-card {
        padding: 1.375rem;
      }

      .blocked-header {
        gap: 0.75rem;
      }

      .blocked-title-section h1 {
        font-size: 1.25rem;
      }

      .blocked-actions {
        flex-direction: column;
      }

      .button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <main class="container">
    <div class="blocked-card">
      <div class="blocked-header">
        <div class="blocked-icon">🚫</div>
        <div class="blocked-title-section">
          <h1>Site Blocked</h1>
          <p class="blocked-subtitle">BlockNSFW – Porn & Adult Content Filter</p>
        </div>
      </div>

      <div class="blocked-content">
        <p class="blocked-message">
          This site has been blocked because it matches your adult-content filters.
          Your protection is active and working to keep your browsing experience safe.
        </p>

        <div class="blocked-url-label">Blocked URL</div>
        <div class="blocked-url" id="target-url">(loading...)</div>
      </div>

      <div class="blocked-actions">
        <a class="button button-primary" id="settings" href="#" target="_blank" rel="noopener">
          ⚙️ Manage Settings
        </a>
        <button class="button" id="back-button" onclick="history.back()">
          ← Go Back
        </button>
        <button class="button button-destructive" id="temporary-bypass" style="display: none;">
          ⚠️ Temporary Bypass
        </button>
      </div>
    </div>
  </main>

  <script src="blocked.js"></script>
</body>
</html>
