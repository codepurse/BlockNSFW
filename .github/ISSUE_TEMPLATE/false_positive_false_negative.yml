name: Blocking accuracy report
description: Report false positive or false negative
title: "[Blocking]: "
labels:
  - blocking
body:
  - type: dropdown
    id: type
    attributes:
      label: Report type
      options:
        - False positive - site or content should not be blocked
        - False negative - site or content should be blocked
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: URL or domain
      placeholder: "Example: https://example.com/page or example.com"
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Why
      description: Explain why this should or should not be blocked.
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Firefox
        - Edge
        - Brave
        - Opera
        - Vivaldi
        - Other Chromium browser
    validations:
      required: true

  - type: checkboxes
    id: features
    attributes:
      label: Relevant features
      options:
        - label: DNS Protection enabled
        - label: SafeSearch enabled
        - label: Reddit checks involved
        - label: Facebook Reels blocking enabled
        - label: Instagram Reels blocking enabled
        - label: Whitelist entry involved

  - type: textarea
    id: extra
    attributes:
      label: Extra context
      description: Include screenshots, text snippet, category, or reproduction notes if helpful.
