<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Blocked</title>
  <style>
    :root {
      --bg: #0f1117;
      --card: #171a23;
      --border: #262b38;
      --text: #e7e9ee;
      --muted: #9aa1b1;
      --accent: #6366f1;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .card {
      width: 100%;
      max-width: 460px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px 32px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
    }
    .badge {
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(99, 102, 241, 0.12);
      color: var(--accent);
      font-size: 30px;
    }
    h1 {
      margin: 0 0 8px;
      font-size: 22px;
      font-weight: 600;
    }
    .reason {
      margin: 0 0 24px;
      color: var(--muted);
      font-size: 15px;
      line-height: 1.5;
    }
    .url {
      display: block;
      word-break: break-all;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      font-size: 13px;
      color: var(--muted);
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
    }
    .label {
      display: block;
      margin: 0 0 6px;
      font-size: 12px;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: left;
    }
    .field { text-align: left; margin-bottom: 20px; }
    button {
      width: 100%;
      padding: 12px 16px;
      border: none;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #545bd8; }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">🛡️</div>
    <h1>This page is blocked</h1>
    <p class="reason">{{reason}}</p>

    <div class="field">
      <span class="label">Blocked address</span>
      <code class="url">{{url}}</code>
    </div>

    <button onclick="history.back()">Go back</button>
  </div>
</body>
</html>
